<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoteHaven - Your Personal Sanctuary</title>
    <meta name="description" content="Your personal sanctuary for notes, tasks, and AI prompts" />
    <meta name="author" content="NoteHaven" />
    
    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NoteHaven" />
    <meta name="theme-color" content="#141414" />

    <!-- Apply saved light/dark mode before first paint to avoid a theme flash.
         Full per-theme color variables are applied by the app on mount. -->
    <script>
      (function () {
        try {
          // Dark-first. 'light'/'dark' are explicit; 'system' follows the OS;
          // unset defaults to dark (the brand default).
          var m = localStorage.getItem('theme');
          var dark;
          if (m === 'light') dark = false;
          else if (m === 'dark') dark = true;
          else if (m === 'system') dark = !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          else dark = true;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) { document.documentElement.classList.add('dark'); }
      })();
    </script>

    <!-- Inter (variable) — the UI font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
